<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 利润池 · 公司经营数据</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#E7ECE9; --card:#FBFCFB; --card-2:#F2F5F3;
  --ink:#18211D; --ink-soft:#54625B; --ink-faint:#8B988F;
  --line:#D4DBD6; --line-soft:#E3E8E4;
  --ok:#0E7C6B; --ok-deep:#0a5a4e; --ok-soft:#CDE7E1;
  --past:#AEBBB3;
  --est:#BC7A12; --est-soft:#F0E0C2;
  --bad:#A6321F; --bad-soft:#EED4CD;
  --muted:#7C8A84;
  --ai:#1F6FB2; --ai-soft:#D6E6F2;
  --shadow:0 1px 2px rgba(24,33,29,.05),0 8px 24px -16px rgba(24,33,29,.25);
  --mono:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:"IBM Plex Sans","IBM Plex Sans SC","PingFang SC","Microsoft YaHei","Noto Sans SC",system-ui,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
a{color:var(--ok)}
:focus-visible{outline:2.5px solid var(--ok);outline-offset:2px;border-radius:4px}
.wrap{max-width:1080px;margin:0 auto;padding:0 22px}

/* breadcrumb / header */
header.top{padding:26px 0 6px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);display:flex;align-items:center;gap:9px;margin-bottom:11px}
.eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--ok)}
.crumbs{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13.5px}
.crumb{appearance:none;border:0;background:none;font-family:inherit;font-size:13.5px;color:var(--ink-soft);cursor:pointer;padding:2px 0}
.crumb:hover{color:var(--ink);text-decoration:underline}
.crumb.cur{color:var(--ink);font-weight:600;cursor:default}
.crumb.cur:hover{text-decoration:none}
.crumb-sep{color:var(--ink-faint);font-size:12px}

h1.title{font-size:clamp(22px,3.3vw,30px);margin:13px 0 4px;font-weight:700;letter-spacing:-.015em}
.lead{color:var(--ink-soft);font-size:13.5px;max-width:66ch;margin:0}
.lead b{color:var(--ink)}

.section-h{font-size:12px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin:28px 0 13px;display:flex;align-items:center;gap:10px}
.section-h::after{content:"";flex:1;height:1px;background:var(--line-soft)}
.section-h .count{font-family:var(--mono);text-transform:none;letter-spacing:0;color:var(--ink-soft);background:var(--card);border:1px solid var(--line);border-radius:20px;padding:2px 10px;font-size:11px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}

/* ====== HOME: directory ====== */
.cover{display:flex;flex-wrap:wrap;gap:14px;align-items:stretch;margin-bottom:4px}
.cover .cv{padding:15px 18px;flex:1;min-width:150px}
.cover .cv .l{font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:7px}
.cover .cv .v{font-family:var(--mono);font-size:25px;font-weight:600;margin-top:6px;letter-spacing:-.01em}
.cover .cv .s{font-size:11px;color:var(--ink-faint);font-family:var(--mono);margin-top:2px}
.cover .cv.accent .v{color:var(--ok)}

.metricbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.metricbar .ml{font-size:12px;color:var(--ink-faint);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em}
.chip{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);font-family:var(--sans);font-size:12.5px;padding:5px 12px;border-radius:20px;cursor:pointer;transition:.12s}
.chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
.chip:hover:not([aria-pressed="true"]){border-color:var(--ink-soft);color:var(--ink)}

.dir{display:flex;flex-direction:column;gap:11px}
.crow{display:grid;grid-template-columns:46px 1.5fr 1.3fr 1fr;gap:14px;align-items:center;padding:15px 17px;cursor:pointer;
  transition:transform .12s,box-shadow .12s,border-color .12s;border:1px solid var(--line);background:var(--card);border-radius:14px;text-align:left;font-family:inherit;width:100%}
.crow:hover{transform:translateY(-2px);box-shadow:0 10px 30px -18px rgba(24,33,29,.4);border-color:var(--ink-soft)}
.logo{width:46px;height:46px;border-radius:11px;display:grid;place-items:center;flex:none;background:#18211D}
.logo span{font-family:var(--mono);font-weight:600;font-size:16px;letter-spacing:-.04em;color:#9fb2a8}
.logo.nv span{color:#76B900}
.cinfo .cn{font-weight:700;font-size:16px;letter-spacing:-.01em}
.cinfo .cmeta{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.tagx{font-family:var(--mono);font-size:10px;color:var(--ink-soft);background:var(--card-2);border:1px solid var(--line-soft);padding:1px 7px;border-radius:5px}
.segtag{font-family:var(--mono);font-size:10px;padding:1px 7px;border-radius:5px}
.segtag.yes{background:var(--ok-soft);color:var(--ok-deep)}
.segtag.partial{background:var(--est-soft);color:#8a5a0f}
.segtag.no{background:var(--bad-soft);color:#822717}
.cmetric{text-align:right}
.cmetric .mv{font-family:var(--mono);font-size:20px;font-weight:600;letter-spacing:-.01em}
.cmetric .ms{font-size:11px;color:var(--ink-faint);font-family:var(--mono);margin-top:2px}
.cmetric .ms .up{color:var(--ok)} .cmetric .ms .dn{color:var(--bad)}
.cbarcell{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.cbar{width:100%;height:9px;border-radius:5px;background:var(--card-2);overflow:hidden}
.cbar .f{height:100%;border-radius:5px;background:var(--ok)}
.cfore{font-family:var(--mono);font-size:11px;color:var(--est)}
.copen{font-family:var(--mono);font-size:11px;color:var(--ink-faint)}
.crow:hover .copen{color:var(--ok)}

/* pending rows */
.prow{display:grid;grid-template-columns:46px 1.6fr 1fr;gap:14px;align-items:center;padding:14px 17px;border:1px dashed var(--line);background:transparent;border-radius:14px}
.prow .logo{background:#E1E7E3;opacity:.85}
.prow .logo span{color:var(--ink-faint)}
.prow .cn{font-weight:600;font-size:15px;color:var(--ink-soft)}
.pendbadge{font-family:var(--mono);font-size:10px;background:var(--card-2);color:var(--ink-faint);border:1px solid var(--line);padding:2px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.06em}
.psrc{font-size:11.5px;color:var(--ink-faint);text-align:right}

.addhint{font-size:12.5px;color:var(--ink-soft);background:var(--card-2);border-radius:11px;padding:13px 15px;margin-top:14px;line-height:1.6}
.addhint code{font-family:var(--mono);font-size:11.5px;background:var(--card);border:1px solid var(--line);border-radius:5px;padding:1px 6px}
.addhint b{color:var(--ink)}

/* ====== COMPANY view ====== */
#company,#detail{display:none}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:14px}
.kpi{padding:16px 17px}
.kpi .k-lbl{font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:7px}
.kpi .k-val{font-family:var(--mono);font-size:26px;font-weight:600;margin-top:7px;letter-spacing:-.01em}
.kpi .k-sub{font-size:11.5px;color:var(--ink-faint);margin-top:3px;font-family:var(--mono)}
.kpi.accent .k-val{color:var(--ok)} .kpi.est .k-val{color:var(--est)}
.swatch{width:9px;height:9px;border-radius:2px;display:inline-block}

.chart-card{padding:20px 20px 14px}
.chart-legend{display:flex;gap:18px;flex-wrap:wrap;font-size:12px;color:var(--ink-soft);margin-top:10px}
.chart-legend .i{display:flex;align-items:center;gap:7px}
.lg{width:16px;height:11px;border-radius:3px}
.lg-hatch{background:var(--est);background-image:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.55) 2px,rgba(255,255,255,.55) 4px)}

.years{display:grid;grid-template-columns:repeat(auto-fit,minmax(228px,1fr));gap:14px}
.ycard{padding:17px 18px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;position:relative;text-align:left;border:1px solid var(--line);background:var(--card);border-radius:14px;font-family:inherit}
.ycard:hover{transform:translateY(-2px);box-shadow:0 10px 30px -18px rgba(24,33,29,.4);border-color:var(--ink-soft)}
.ycard.is-fc{border-style:dashed}
.ycard .yhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.ycard .yfy{font-size:19px;font-weight:700;letter-spacing:-.01em}
.ybadge{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.06em}
.ybadge.act{background:var(--ok-soft);color:var(--ok-deep)}
.ybadge.fc{background:var(--est-soft);color:#8a5a0f}
.ycard .yrev{font-family:var(--mono);font-size:25px;font-weight:600;letter-spacing:-.01em}
.ycard .yrevlbl{font-size:11px;color:var(--ink-faint);font-family:var(--mono);margin-top:1px}
.ycard .yrow{display:flex;justify-content:space-between;font-size:12.5px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
.ycard .yrow .l{color:var(--ink-soft)} .ycard .yrow .v{font-family:var(--mono);font-weight:500}
.ycard .yopen{position:absolute;right:15px;bottom:14px;color:var(--ink-faint);font-size:12px;font-family:var(--mono)}
.ycard:hover .yopen{color:var(--ok)}

/* ====== DETAIL ====== */
.dhead{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin:8px 0 2px}
.dhead .dfy{font-size:29px;font-weight:700;letter-spacing:-.015em}
.dhead .dperiod{font-family:var(--mono);font-size:12.5px;color:var(--ink-soft)}
.dbadge{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.06em}
.csum{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));overflow:hidden}
.csum .c{padding:15px 17px;border-right:1px solid var(--line-soft)}
.csum .c:last-child{border-right:0}
.csum .cl{font-size:11px;color:var(--ink-faint);font-family:var(--mono)}
.csum .cv{font-family:var(--mono);font-size:20px;font-weight:600;margin-top:5px}
.csum .cv.green{color:var(--ok)}
.plat{padding:6px 18px 16px}
.platrow{padding:13px 0;border-bottom:1px solid var(--line-soft)}
.platrow:last-child{border-bottom:0}
.platrow .pt{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:7px}
.platrow .pname{font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:9px}
.aitag{font-family:var(--mono);font-size:9.5px;background:var(--ai-soft);color:var(--ai);padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.05em}
.platrow .pv{font-family:var(--mono);font-size:15px;font-weight:600;white-space:nowrap}
.platrow .pv .sh{color:var(--ink-faint);font-weight:400;font-size:12px;margin-left:6px}
.platrow .ptrack{height:11px;border-radius:5px;background:var(--card-2);overflow:hidden}
.platrow .pfill{height:100%;border-radius:5px;background:var(--ok)}
.platrow.ai .pfill{background:var(--ai)}
.platrow .pyoy{font-family:var(--mono);font-size:11px;margin-top:5px}
.pyoy .up{color:var(--ok)} .pyoy .dn{color:var(--bad)} .pyoy .na{color:var(--ink-faint)}
.recon-line{font-size:12px;color:var(--ink-soft);font-family:var(--mono);padding:11px 18px;border-top:1px dashed var(--line)}
.recon-line .ok{color:var(--ok);font-weight:600}
.gap{padding:17px 18px;background:linear-gradient(0deg,var(--est-soft),var(--card));border:1px solid #E4CFA4;border-left:4px solid var(--est);border-radius:13px}
.gap h3{margin:0 0 6px;font-size:15px;color:#5d4410}
.gap p{margin:0 0 12px;font-size:13px;color:#6b4e16;line-height:1.55}
.gap .seg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gap .seg{background:var(--card);border:1px solid #E4CFA4;border-radius:10px;padding:11px 13px}
.gap .seg .sn{font-size:12.5px;font-weight:600} .gap .seg .sv{font-family:var(--mono);font-size:20px;font-weight:600;margin-top:3px}
.gap .seg .sl{font-size:10.5px;color:var(--ink-faint);font-family:var(--mono);margin-top:2px}
.gap .locked{margin-top:13px;display:flex;align-items:center;gap:9px;font-size:12.5px;color:#6b4e16;background:var(--card);border-radius:9px;padding:10px 12px}
.fcgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.fcc{padding:14px 15px}
.fcc .fl{font-size:11px;color:var(--ink-faint);font-family:var(--mono)}
.fcc .fv{font-family:var(--mono);font-size:20px;font-weight:600;margin-top:4px}
.fcc .fs{font-size:11px;color:var(--ink-soft);margin-top:3px}
.fcc.big .fv{color:var(--est)}
.srcs{padding:6px 18px 14px}
.srcrow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line-soft);font-size:13px}
.srcrow:last-child{border-bottom:0}
.srcrow .sl{color:var(--ink-soft)} .srcrow a{word-break:break-all;font-size:12px}
.note-block{font-size:12.5px;color:var(--ink-soft);background:var(--card-2);border-radius:10px;padding:12px 15px;line-height:1.6;margin-top:13px}
.note-block b{color:var(--ink)}

footer{color:var(--ink-faint);font-size:12px;padding:30px 0 50px;text-align:center;line-height:1.7}
footer b{color:var(--ink-soft)}

@media(max-width:640px){
  .crow{grid-template-columns:42px 1fr auto}
  .crow .cbarcell{display:none}
  .prow{grid-template-columns:42px 1fr}
  .prow .psrc{display:none}
  .csum{grid-template-columns:1fr 1fr} .gap .seg2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="wrap">
  <header class="top">
    <div class="eyebrow"><span class="dot"></span>AI 利润池 · 公司经营数据 · v0</div>
    <nav class="crumbs" id="crumbs"></nav>
  </header>

  <!-- ============ HOME · DIRECTORY ============ -->
  <section id="home">
    <h1 class="title">公司对比</h1>
    <p class="lead">主页是一个<b>公司登记表</b>：客观经营事实，跨公司可比。今天只有 NVIDIA 补录完整，其余为<b>预留槽位</b> —— 增加一家公司只需往 <code style="font-family:var(--mono)">DATA.companies</code> 推入一个对象，界面自动扩展。</p>

    <div class="section-h">覆盖情况</div>
    <div class="cover" id="cover"></div>

    <div class="section-h">已补录公司 <span class="count" id="popCount"></span></div>
    <div class="metricbar">
      <span class="ml">对比指标</span>
      <button class="chip" data-m="revenue" aria-pressed="true">营收</button>
      <button class="chip" data-m="netIncome" aria-pressed="false">净利润</button>
      <button class="chip" data-m="netM" aria-pressed="false">净利率</button>
    </div>
    <div class="dir" id="popDir"></div>

    <div class="section-h">预留槽位 · 待补录 <span class="count" id="pendCount"></span></div>
    <div class="dir" id="pendDir"></div>

    <div class="addhint" id="addHint"></div>
  </section>

  <!-- ============ COMPANY ============ -->
  <section id="company">
    <h1 class="title" id="cTitle"></h1>
    <p class="lead" id="cLead"></p>
    <div class="section-h">公司层面 · 量级</div>
    <div class="kpis" id="cKpis"></div>
    <div class="section-h" id="cTrendH">营收与净利润</div>
    <div class="card chart-card">
      <svg id="trend" role="img" aria-label="营收与净利润趋势"></svg>
      <div class="chart-legend">
        <div class="i"><span class="lg" style="background:var(--past)"></span>营收（实际）</div>
        <div class="i"><span class="lg" style="background:var(--ok)"></span>净利润（实际）</div>
        <div class="i"><span class="lg lg-hatch"></span>预测</div>
        <div class="i"><span class="lg" style="background:transparent;border-top:2px dashed var(--ink-soft);height:2px;border-radius:0;margin-top:5px"></span>净利率 %</div>
      </div>
    </div>
    <div class="section-h">按财年下钻 · 点击进入业务板块明细</div>
    <div class="years" id="cYears"></div>
    <div class="note-block" id="cNote"></div>
  </section>

  <!-- ============ DETAIL ============ -->
  <section id="detail">
    <div class="dhead">
      <span class="dfy" id="dFy"></span>
      <span class="dperiod" id="dPeriod"></span>
      <span class="dbadge" id="dBadge"></span>
    </div>
    <div id="detailBody"></div>
  </section>

  <footer>
    三层抽象：<b>登记表（公司）→ 公司（多年）→ 财年（板块）</b> · 实际 = 官方财报 GAAP · 预测 = 卖方一致预期 · 分部利润随公司披露能力而定
  </footer>
</div>

<script>
/* =====================================================================
   M — MODEL.  A company REGISTRY, not a single company.
   Adding a company = push one object into DATA.companies.
   Reserved per-company fields: id, name, ticker, region, sector,
   currency, segProfit('yes'|'partial'|'no'), aiPlatform, status, years[].
   Each year (actual): revenue, grossM, opIncome, netIncome, platforms[], seg, sources[].
   ===================================================================== */
const DATA = {
  meta:{ unit:"十亿美元 (USD bn)" },
  companies:[
    /* ---------------- POPULATED ---------------- */
    { id:"nvda", name:"NVIDIA 英伟达", ticker:"NASDAQ · NVDA", region:"美国", sector:"AI 加速计算",
      currency:"USD", segProfit:"partial", aiPlatform:"Data Center", logo:"nv", logoText:"nv",
      status:"populated",
      lead:"营收拆到 5 个市场平台，利润只披露到 2 个报告分部 —— “分部毛利率拿不到”的活样本。",
      years:[
        { fy:"FY2024", periodEnd:"截至 2024-01-28", status:"actual",
          revenue:60.92, grossM:0.727, opIncome:32.97, netIncome:29.76,
          platforms:[
            {name:"Data Center 数据中心", value:47.52, ai:true},
            {name:"Gaming 游戏", value:10.45},
            {name:"Professional Visualization 专业可视化", value:1.55},
            {name:"Automotive 汽车", value:1.09},
            {name:"OEM & Other", value:0.31},
          ],
          seg:{cn:"≈ 78%", gfx:"≈ 22%"},
          sources:[{label:"FY2024 业绩（FY2025 新闻稿含上一年对比）", url:"https://nvidianews.nvidia.com/news/nvidia-announces-financial-results-for-fourth-quarter-and-fiscal-2025"}]},
        { fy:"FY2025", periodEnd:"截至 2025-01-26", status:"actual",
          revenue:130.50, grossM:0.750, opIncome:81.45, netIncome:72.88,
          platforms:[
            {name:"Data Center 数据中心", value:115.19, ai:true},
            {name:"Gaming 游戏", value:11.35},
            {name:"Professional Visualization 专业可视化", value:1.88},
            {name:"Automotive 汽车", value:1.69},
            {name:"OEM & Other", value:0.39},
          ],
          seg:{cn:"≈ 88%", gfx:"≈ 12%"},
          sources:[
            {label:"FY2025 业绩新闻稿", url:"https://nvidianews.nvidia.com/news/nvidia-announces-financial-results-for-fourth-quarter-and-fiscal-2025"},
            {label:"FY2025 10-K（Note 16）", url:"https://www.sec.gov/Archives/edgar/data/0001045810/000104581025000023/nvda-20250126.htm"}]},
        { fy:"FY2026", periodEnd:"截至 2026-01-25", status:"actual",
          revenue:215.94, grossM:0.711, opIncome:130.39, netIncome:120.10,
          platforms:[
            {name:"Data Center 数据中心", value:193.74, ai:true},
            {name:"Gaming 游戏", value:16.04},
            {name:"Professional Visualization 专业可视化", value:3.19},
            {name:"Automotive 汽车", value:2.35},
            {name:"OEM & Other", value:0.62},
          ],

/* =====================================================================
   P — PRESENTER.  Company-aware; nothing hard-codes NVIDIA.
   ===================================================================== */
const P = {
  bn:(v,d=1)=> v==null?"—":"$"+v.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})+"B",
  pct:(v,d=1)=> v==null?"—":(v*100).toFixed(d)+"%",
  yoy:(v)=> v==null?"—":(v>=0?"+":"")+(v*100).toFixed(1)+"%",
  netM:(y)=> (y&&y.revenue&&y.netIncome!=null)?y.netIncome/y.revenue:null,
  opM:(y)=> (y&&y.revenue&&y.opIncome!=null)?y.opIncome/y.revenue:null,
  byId:(id)=> DATA.companies.find(c=>c.id===id),
  populated:()=> DATA.companies.filter(c=>c.status==="populated"&&c.years.length),
  pending:()=> DATA.companies.filter(c=>c.status!=="populated"||!c.years.length),
  actualYears:(c)=> c.years.filter(y=>y.status==="actual"),
  forecastYear:(c)=> c.years.find(y=>y.status==="forecast"),
  latestActual:(c)=>{ const a=P.actualYears(c); return a.length?a[a.length-1]:null; },
  yearIndex:(c,fy)=> c.years.findIndex(y=>y.fy===fy),
  revYoY:(c,i)=>{ if(i<=0)return null; const a=c.years[i-1].revenue,b=c.years[i].revenue; return a?(b-a)/a:null; },
  platTotal:(y)=> (y.platforms||[]).reduce((s,p)=>s+p.value,0),
  platSorted:(y)=> (y.platforms||[]).slice().sort((a,b)=>b.value-a.value),
  platYoY:(c,y,name)=>{ const i=c.years.indexOf(y); if(i<=0)return null;
    const prev=(c.years[i-1].platforms||[]).find(p=>p.name===name), cur=(y.platforms||[]).find(p=>p.name===name);
    return (prev&&cur&&prev.value)?(cur.value-prev.value)/prev.value:null; },
  segLabel:(s)=> ({yes:"分部利润 · 可得",partial:"分部利润 · 部分",no:"分部利润 · 不可得"}[s]||"分部利润 · 未知"),
};

const HOME_METRICS={
  revenue:  {label:"营收",   get:c=>{const y=P.latestActual(c);return y?y.revenue:null},   fmt:v=>P.bn(v,1)},
  netIncome:{label:"净利润", get:c=>{const y=P.latestActual(c);return y?y.netIncome:null}, fmt:v=>P.bn(v,1)},
  netM:     {label:"净利率", get:c=>{const y=P.latestActual(c);return y?P.netM(y):null},   fmt:v=>P.pct(v)},
};

/* =====================================================================
   V — VIEW + navigation state machine.
   ===================================================================== */
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const state={ view:"home", companyId:null, fy:null, homeMetric:"revenue" };

function show(view){
  state.view=view;
  $("#home").style.display    = view==="home"?"block":"none";
  $("#company").style.display = view==="company"?"block":"none";
  $("#detail").style.display  = view==="detail"?"block":"none";
  renderCrumbs();
  window.scrollTo({top:0,behavior:"instant"});
}
function renderCrumbs(){
  const parts=[{label:"公司对比", go:()=>goHome()}];
  if(state.companyId){ const c=P.byId(state.companyId); parts.push({label:c.name, go:()=>goCompany(c.id)}); }
  if(state.view==="detail"&&state.fy){ parts.push({label:state.fy, go:null}); }
  $("#crumbs").innerHTML=parts.map((p,i)=>{
    const cur=i===parts.length-1;
    return `${i?'<span class="crumb-sep">/</span>':''}<button class="crumb ${cur?'cur':''}" data-i="${i}">${p.label}</button>`;
  }).join("");
  $$("#crumbs .crumb").forEach(b=>{ const p=parts[+b.dataset.i]; if(p.go&&!b.classList.contains("cur")) b.onclick=p.go; });
}

        <div class="cmeta">
          <span class="tagx">${c.region}</span><span class="tagx">${c.sector}</span>

  $("#addHint").innerHTML=`<b>扩展方式：</b>每个槽位上方的 <code>分部利润</code> 标签已经预判了补录后能做到什么 —— <span class="segtag yes" style="display:inline">可得</span>（如三星、博通：按部门披露营业利润，下钻能给出真利润与利润率）、<span class="segtag partial" style="display:inline">部分</span>、<span class="segtag no" style="display:inline">不可得</span>（如台积电、ASML：只能到营收级，下钻会显式留空）。补录一家公司，就是给它的 <code>years[]</code> 填入各财年对象，主页与下钻无需改动。`;

function renderTrend(c){
  const svg=$("#trend"), data=c.years;
  const W=Math.max(560, svg.clientWidth||820), padL=40,padR=20,padT=24,padB=46;
  const innerW=W-padL-padR, H=320, innerH=H-padT-padB;
  const max=Math.max(...data.map(y=>y.revenue))*1.08;
  const groupW=innerW/data.length, barW=Math.min(46,groupW*0.30);
  const yS=v=>padT+innerH-(v/max)*innerH;
  let s=`<defs><pattern id="h2" width="5" height="5" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="5" height="5" fill="var(--past)"/><line x1="0" y1="0" x2="0" y2="5" stroke="#fff" stroke-width="2" opacity=".55"/></pattern><pattern id="h3" width="5" height="5" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="5" height="5" fill="var(--ok)"/><line x1="0" y1="0" x2="0" y2="5" stroke="#fff" stroke-width="2" opacity=".55"/></pattern></defs>`;
  for(let i=0;i<=4;i++){ const gv=max*i/4, gy=yS(gv);
    s+=`<line x1="${padL}" y1="${gy}" x2="${W-padR}" y2="${gy}" stroke="var(--line-soft)"/>`;
    s+=`<text x="${padL-6}" y="${gy+3}" text-anchor="end" font-family="var(--mono)" font-size="9.5" fill="var(--ink-faint)">${gv.toFixed(0)}</text>`; }
  data.forEach((y,i)=>{
    const cx=padL+groupW*i+groupW/2, revH=(y.revenue/max)*innerH, niH=((y.netIncome||0)/max)*innerH;
    const revFill=y.status==="forecast"?"url(#h2)":"var(--past)", niFill=y.status==="forecast"?"url(#h3)":"var(--ok)";
    const x1=cx-barW-3, x2=cx+3;
    s+=`<rect x="${x1}" y="${yS(y.revenue)}" width="${barW}" height="${revH}" rx="3" fill="${revFill}"/>`;
    s+=`<text x="${x1+barW/2}" y="${yS(y.revenue)-5}" text-anchor="middle" font-family="var(--mono)" font-size="10" font-weight="600" fill="var(--ink-soft)">${y.revenue}</text>`;
    s+=`<rect x="${x2}" y="${yS(y.netIncome||0)}" width="${barW}" height="${niH}" rx="3" fill="${niFill}"/>`;
    s+=`<text x="${x2+barW/2}" y="${yS(y.netIncome||0)-5}" text-anchor="middle" font-family="var(--mono)" font-size="10" font-weight="600" fill="var(--ok-deep)">${y.netIncome||"—"}</text>`;
    s+=`<text x="${cx}" y="${H-padB+18}" text-anchor="middle" font-family="var(--mono)" font-size="11" font-weight="${y.status==='forecast'?'400':'600'}" fill="${y.status==='forecast'?'var(--est)':'var(--ink)'}">${y.fy}</text>`;
  });
  const mline=data.map((y,i)=>{ const nm=P.netM(y); if(nm==null)return null;
    return {cx:padL+groupW*i+groupW/2, my:padT+(1-nm)*innerH*0.42, nm}; }).filter(Boolean);
  if(mline.length>1){
    s+=`<polyline points="${mline.map(p=>p.cx+','+p.my).join(' ')}" fill="none" stroke="var(--ink-soft)" stroke-width="1.6" stroke-dasharray="4 3"/>`;
    mline.forEach(p=> s+=`<circle cx="${p.cx}" cy="${p.my}" r="2.6" fill="var(--ink-soft)"/><text x="${p.cx}" y="${p.my-7}" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="var(--ink-soft)">${(p.nm*100).toFixed(0)}%</text>`);
  }
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`); svg.style.width="100%"; svg.style.height=H+"px"; svg.innerHTML=s;
}

  }).join("");
  const reconOk=Math.abs(total-y.revenue)<0.05;
  return `
  <div class="section-h" style="margin-top:18px">公司层面 · ${y.fy}</div>
  <div class="card csum">

    <div class="c"><div class="cl">净利润</div><div class="cv num green">${P.bn(y.netIncome,1)}</div></div>
    <div class="c"><div class="cl">净利率</div><div class="cv num green">${P.pct(P.netM(y))}</div></div>
  </div>
  <div class="section-h">业务板块营收 · 按市场平台 · 降序</div>
  <div class="card"><div class="plat">${platHtml}</div>
    <div class="recon-line">平台合计 ${P.bn(total,2)} ${reconOk?'<span class="ok">＝</span>':'≠'} 公司总营收 ${P.bn(y.revenue,2)} ${reconOk?'<span class="ok">✓ 对账通过</span>':''}</div>
  </div>
  <div class="section-h">利润 / 毛利率 · 数据缺口（真实约束）</div>
  <div class="gap">
    <h3>${c.name.split(" ")[0]} 不把利润拆到上面的市场平台</h3>
    <p>公司只把经营利润披露到 <b>2 个报告分部</b>（Compute &amp; Networking / Graphics），且<b>不披露各平台毛利率</b>。所以“每个板块利润、毛利率降序”对它在公开财报里只能到营收级 —— 这就是你担心的缺口，在真实数据里的样子：</p>
    <div class="seg2">
      <div class="seg"><div class="sn">Compute &amp; Networking</div><div class="sv num">${y.seg.cn}</div><div class="sl">占营收 · 含数据中心/网络/汽车</div></div>
      <div class="seg"><div class="sn">Graphics</div><div class="sv num">${y.seg.gfx}</div><div class="sl">占营收 · 含游戏/专业可视化</div></div>
    </div>
    <div class="locked">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" style="flex:none"><rect x="5" y="11" width="14" height="9" rx="2" stroke="#8a5a0f" stroke-width="1.8"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="#8a5a0f" stroke-width="1.8"/></svg>
      <span><b>平台级毛利率 / 净利润：未披露。</b>诚实做法是留空并标注，而不是估一个数填进去。</span>
    </div>
  </div>
  ${sourcesBlock(y)}`;
}
function forecastView(c,y){
  const anchors=(y.anchors||[]).map((a,i)=>`
    <div class="card fcc ${i===3?'big':''}"><div class="fl">${a.label}</div>
      <div class="fv num">${a.value}</div><div class="fs">${a.note}</div></div>`).join("");
  return `
  <div class="section-h" style="margin-top:18px">本财年 · 预测（非实际）</div>
  <div class="note-block" style="margin-top:0"><b>这是预测，不是已实现的经营事实。</b>全年一致预期约 ${P.bn(y.revenue,0)}（区间 ${y.consensusRev}），一致预期 EPS 约 ${y.consensusEps}。下方锚点中 Q1 为<b>已公布实际</b>、Q2 为<b>公司指引</b>、全年为<b>卖方综合</b>，可靠度不同。</div>
  <div class="section-h">预测锚点</div>
  <div class="fcgrid">${anchors}</div>
  <div class="section-h">板块口径 · 重要变化</div>
  <div class="gap"><h3>从本财年起，NVIDIA 改了板块划分</h3>
    <p>自 FY2027 Q1 起，由“数据中心/游戏/专业可视化/汽车/OEM”五平台改为两大平台：<b>Data Center</b>（含 Hyperscale 与 ACIE）与 <b>Edge Computing</b>。FY2027 起的板块明细<b>无法与 FY2024–FY2026 逐项对比</b> —— 分部定义变了，是趋势分析里很现实的断点。</p></div>
  ${sourcesBlock(y)}`;
}
function sourcesBlock(y){
  const rows=(y.sources||[]).map(s=>`<div class="srcrow"><span class="sl">${s.label}</span><a href="${s.url}" target="_blank" rel="noopener">官方来源 ↗</a></div>`).join("");
  return `<div class="section-h">数据来源</div><div class="card srcs">${rows}</div>`;
}

/* ---------- init ---------- */
function init(){ goHome();
  let rT; window.addEventListener("resize",()=>{ clearTimeout(rT); rT=setTimeout(()=>{ if(state.view==="company"&&state.companyId) renderTrend(P.byId(state.companyId)); },150); });
}
init();
</script>
